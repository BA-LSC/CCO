# External PostgreSQL (e.g. Vultr Managed Database over VPC).
# Skips the bundled postgres container; migrate/reconcile use DATABASE_URL only.
#
#   docker compose -f deploy/docker-compose.prod.yml -f deploy/docker-compose.external-db.yml up -d --build
#
# Or: set DATABASE_URL to an external host and run ./deploy/bootstrap.sh (auto-detected)

services:
  postgres:
    profiles: ["container-db"]

  migrate:
    depends_on: {}

  reconcile:
    depends_on: {}
