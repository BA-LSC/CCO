# Production stack for CCO (Chat Center Online)
#
# From the repository root:
#   cp deploy/.env.production.example .env
#   # edit .env
#   docker compose -f deploy/docker-compose.prod.yml up -d --build
#
# See deploy/README.md for the full guide.

name: cco

services:
  postgres:
    image: postgres:18-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-cco}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-cco}
    volumes:
      # Postgres 18+ expects the mount at /var/lib/postgresql (not .../data).
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cco} -d ${POSTGRES_DB:-cco}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:8-alpine
    restart: unless-stopped
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:?Set REDIS_PASSWORD in .env}
    command:
      [
        "redis-server",
        "--appendonly",
        "yes",
        "--requirepass",
        "${REDIS_PASSWORD:?Set REDIS_PASSWORD in .env}",
      ]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", 'redis-cli -a "$REDIS_PASSWORD" ping | grep -q PONG']
      interval: 5s
      timeout: 3s
      retries: 10

  migrate:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.api
    env_file:
      - ../.env
    environment:
      DATABASE_URL: ${DATABASE_URL}
    depends_on:
      postgres:
        condition: service_healthy
    command: ["bun", "run", "db:migrate"]
    restart: "no"

  api:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.api
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL:?Set REDIS_URL in .env}
      UPLOAD_DIR: /data/uploads
    volumes:
      - uploads_data:/data/uploads
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    expose:
      - "3001"

  web:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.web
      args:
        NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL}
        NEXT_PUBLIC_WEB_URL: ${NEXT_PUBLIC_WEB_URL}
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      NODE_ENV: production
      API_URL: http://api:3001
      API_DOMAIN: ${API_DOMAIN}
      WEB_URL: ${WEB_URL}
      PORT: "3000"
      HOSTNAME: 0.0.0.0
    depends_on:
      api:
        condition: service_healthy
    expose:
      - "3000"

  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    environment:
      TUNNEL_TOKEN: ${CLOUDFLARE_TUNNEL_TOKEN:?Set CLOUDFLARE_TUNNEL_TOKEN in .env}
    depends_on:
      api:
        condition: service_healthy
      web:
        condition: service_started

  reconcile:
    profiles: ["jobs"]
    build:
      context: ..
      dockerfile: deploy/Dockerfile.api
    env_file:
      - ../.env
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL}
    command: ["bun", "run", "jobs:reconcile"]
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

volumes:
  postgres_data:
  redis_data:
  uploads_data:
