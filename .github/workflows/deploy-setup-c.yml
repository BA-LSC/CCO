name: Deploy setup-c.co

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "apps/install/**"
      - "workers/install-orchestrator/**"
      - "deploy/cloudflare/**"
      - "packages/cloudflare-provision/**"
      - "packages/shared/**"
      - "packages/db/**"
      - "apps/web/**"
      - "services/api/**"
      - "workers/**"
      - ".github/workflows/deploy-setup-c.yml"

concurrency:
  group: deploy-setup-c
  cancel-in-progress: true

jobs:
  deploy:
    name: Build releases and deploy setup-c.co
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read

    # Repo secret CLOUDFLARE_API_TOKEN (CCO Cloudflare account):
    #   Account → Workers Scripts → Edit, Workers KV Storage → Edit (KV error 10023 if missing)
    #   Zone setup-c.co → Workers Routes → Edit (routes API error 10000 if missing)
    #   User → User Details → Read (optional; silences wrangler warning)
    # Set CLOUDFLARE_ACCOUNT_ID to avoid wrangler GET /accounts (502-prone).

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2.2.0
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Cache Turbo
        uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ hashFiles('bun.lock', 'turbo.json') }}
          restore-keys: |
            ${{ runner.os }}-turbo-

      # Next.js warns in CI when apps/web/.next/cache is missing at build start (monorepo path, not repo root).
      - name: Restore Next.js build cache
        id: next-build-cache
        uses: actions/cache@v4
        with:
          path: |
            apps/web/.next/cache
            apps/install/.next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('bun.lock') }}-${{ hashFiles('apps/web/**', 'apps/install/**', 'packages/**', 'services/**') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('bun.lock') }}-
            ${{ runner.os }}-nextjs-

      - name: Log Next.js cache restore
        run: |
          for dir in apps/web/.next/cache apps/install/.next/cache; do
            if [ -d "$dir" ]; then
              echo "$dir restored ($(find "$dir" -type f 2>/dev/null | wc -l | tr -d ' ') files)"
            else
              echo "$dir not present yet (expected on first successful CI run)"
            fi
          done

      - name: Verify Cloudflare token (setup-c.co routes)
        run: |
          set -euo pipefail
          api() { curl -sf -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" "$@"; }
          zones_url="https://api.cloudflare.com/client/v4/zones?name=setup-c.co"
          if [ -n "${CLOUDFLARE_ACCOUNT_ID:-}" ]; then
            zones_url="${zones_url}&account.id=${CLOUDFLARE_ACCOUNT_ID}"
          fi
          zone_id="$(api "${zones_url}" | jq -r '.result[0].id // empty')"
          if [ -z "${zone_id}" ]; then
            echo "::error::Zone setup-c.co not found on this account. Set CLOUDFLARE_ACCOUNT_ID to the CCO account id."
            exit 1
          fi
          routes_json="$(mktemp)"
          http_code="$(curl -s -o "${routes_json}" -w "%{http_code}" -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            "https://api.cloudflare.com/client/v4/zones/${zone_id}/workers/routes")"
          if [ "${http_code}" != "200" ]; then
            echo "::error::Token cannot access Workers Routes on setup-c.co (HTTP ${http_code}). Add Zone → Workers Routes → Edit for setup-c.co and update the CLOUDFLARE_API_TOKEN secret."
            cat "${routes_json}" || true
            exit 1
          fi
          echo "Cloudflare token can list Workers Routes on setup-c.co (zone ${zone_id})."
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Build release artifacts
        run: bun deploy/cloudflare/build-release-artifacts.ts
        env:
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          NODE_OPTIONS: --max-old-space-size=6144

      - name: Deploy install orchestrator
        working-directory: workers/install-orchestrator
        run: |
          set -euo pipefail
          for attempt in 1 2 3 4; do
            if bunx wrangler deploy; then
              exit 0
            fi
            echo "wrangler deploy failed (attempt ${attempt}/4)"
            sleep $((attempt * 20))
          done
          exit 1
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Verify published release artifacts
        run: bun deploy/cloudflare/verify-published-releases.ts
        env:
          GITHUB_SHA: ${{ github.sha }}
          CCO_RELEASES_BASE_URL: https://setup-c.co/releases

      - name: Build install wizard
        working-directory: apps/install
        run: bun run build:cloudflare
        env:
          NODE_OPTIONS: --max-old-space-size=6144

      - name: Deploy install wizard
        working-directory: apps/install
        run: |
          set -euo pipefail
          for attempt in 1 2 3 4; do
            if bunx wrangler deploy; then
              exit 0
            fi
            echo "wrangler deploy failed (attempt ${attempt}/4)"
            sleep $((attempt * 20))
          done
          exit 1
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
